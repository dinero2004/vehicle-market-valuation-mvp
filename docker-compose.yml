services:
  postgres:
    image: postgres:16-alpine
    container_name: dealer-mgmt-postgres
    environment:
      POSTGRES_DB: dealer_mgmt
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - dealer_mgmt_postgres_data:/var/lib/postgresql/data

volumes:
  dealer_mgmt_postgres_data:
